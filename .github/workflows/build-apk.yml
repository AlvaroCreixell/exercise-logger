name: Build Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev automake

      - name: Install buildozer + cython
        run: |
          pip install --upgrade pip
          pip install 'buildozer==1.5.0' 'cython<3'

      - name: Patch buildozer.spec to use known-good p4a + pyjnius
        run: |
          # Use p4a develop branch which has the Python 3 pyjnius fix
          echo "" >> buildozer.spec
          echo "p4a.branch = develop" >> buildozer.spec

      - name: Build debug APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: |
          yes | buildozer android debug 2>&1 | tee build.log | tail -100
          echo "--- Build complete ---"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: exercise-logger-debug
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
