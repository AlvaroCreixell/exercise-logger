name: Build Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    container:
      image: kivy/buildozer:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Buildozer Android dependencies
        uses: actions/cache@v4
        with:
          path: |
            /github/home/.buildozer/android/packages
            /github/home/.buildozer/android/platform
          key: ${{ runner.os }}-buildozer-android-v1-${{ hashFiles('buildozer.spec', '.github/workflows/build-apk.yml') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-android-v1-

      - name: Mark workspace as safe for git
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build debug APK
        shell: bash
        run: |
          set -eo pipefail
          buildozer android debug 2>&1 | tee build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: exercise-logger-debug
          path: bin/*.apk
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
